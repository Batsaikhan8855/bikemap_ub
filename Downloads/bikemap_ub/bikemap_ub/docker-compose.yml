services:
  web:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - ./backend:/app
      - static_vol:/app/staticfiles
      - media_vol:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1
      # Backend uses the in-network DNS name "osrm" (the service below).
      - OSRM_BASE_URL=http://osrm:5000
    depends_on:
      db:
        condition: service_healthy
      osrm:
        condition: service_started

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bikemap_db
      POSTGRES_USER: bikemap
      POSTGRES_PASSWORD: bikemap_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bikemap -d bikemap_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    volumes:
      - static_vol:/static:ro
      - media_vol:/media:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web

  # ─── OSRM routing engine (bicycle profile) ─────────────────────────
  # Reads pre-built .osrm files from ./osrm-data. To build them, run:
  #   ./scripts/prepare-osrm.sh
  # which downloads the Mongolia OSM extract and runs extract/partition/customize.
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    # OSRM нь зөвхөн linux/amd64 build гаргадаг тул Apple Silicon (arm64)
    # дээр Rosetta emulation-аар ажиллуулна. Бага зэрэг удаан, гэхдээ работает.
    platform: linux/amd64
    command: >
      osrm-routed --algorithm mld --max-matching-size 5000
                  --max-viaroute-size 10000
                  /data/mongolia-latest.osrm
    volumes:
      - ./osrm-data:/data
    ports:
      # macOS-ийн AirPlay Receiver port 5000-ыг эзэлдэг тул host-side 5001-г
      # ашиглаж байна. Container дотор OSRM 5000 дээр сонсож байгаа.
      - "5001:5000"
    restart: unless-stopped

volumes:
  postgres_data:
  static_vol:
  media_vol:
