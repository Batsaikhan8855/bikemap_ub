<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}BikeMap UB{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}"/>
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bm-nav border-bottom border-secondary">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
      <span class="bm-logo-icon">&#x1F6B2;</span>
      <span class="text-success">Bike</span><span class="text-white">Map</span>
      <span class="badge bg-secondary fw-normal ms-1" style="font-size:.6rem">UB</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% block nav_map %}{% endblock %}" href="/map/">
            <i class="bi bi-map-fill me-1"></i>Газрын зураг
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% block nav_route %}{% endblock %}" href="/stats/">
            <i class="bi bi-bar-chart-fill me-1"></i>Статистик
          </a>
        </li>
        <li class="nav-item" id="navAdmin" style="display:none">
          <a class="nav-link {% block nav_dash %}{% endblock %}" href="/dashboard/">
            <i class="bi bi-speedometer2 me-1"></i>Админ
          </a>
        </li>
        <li class="nav-item" id="navProfile" style="display:none">
          <a class="nav-link {% block nav_profile %}{% endblock %}" href="/profile/">
            <i class="bi bi-person-circle me-1"></i>Профайл
          </a>
        </li>
      </ul>
      <div class="d-flex gap-2 align-items-center">
        <div id="navGuest">
          <a href="/login/" class="btn btn-outline-secondary btn-sm">Нэвтрэх</a>
          <a href="/register/" class="btn btn-success btn-sm ms-1">Бүртгүүлэх</a>
        </div>
        <div id="navUser" style="display:none" class="d-flex align-items-center gap-2">
          <span class="text-secondary small" id="navUsername"></span>
          <button class="btn btn-outline-danger btn-sm" onclick="Auth.logout()">
            <i class="bi bi-box-arrow-right"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- GPS Active Banner -->
<div id="gpsBanner" class="bm-gps-banner d-none">
  <span class="bm-pulse me-2"></span>
  GPS бичлэг явагдаж байна &nbsp;
  <span id="gpsBannerDist" class="fw-bold">0.00 км</span>
  &nbsp;·&nbsp;
  <span id="gpsBannerTime">00:00</span>
</div>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index:2000" id="toastContainer"></div>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
{% load static %}
<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/api.js' %}"></script>
{% block extra_js %}{% endblock %}
<script>document.addEventListener('DOMContentLoaded',()=>AuthState.init());</script>
</body>
</html>
