{% extends 'base/base.html' %}
{% block title %}Нэвтрэх — BikeMap UB{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="card bg-darker border-secondary" style="width:400px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="fs-1">&#x1F6B2;</div>
        <h5 class="fw-bold mt-2">Нэвтрэх</h5>
        <p class="text-secondary small">BikeMap UB системд нэвтрэнэ үү</p>
      </div>
      <div id="loginErr" class="alert alert-danger py-2 small d-none"></div>
      <div class="mb-3">
        <label class="form-label small text-secondary">Имэйл</label>
        <input type="email" id="loginEmail" class="form-control bg-dark text-light border-secondary" placeholder="you@email.com"/>
      </div>
      <div class="mb-4">
        <label class="form-label small text-secondary">Нууц үг</label>
        <input type="password" id="loginPwd" class="form-control bg-dark text-light border-secondary" placeholder="••••••••"/>
      </div>
      <button class="btn btn-success w-100 mb-3" onclick="doLogin()">
        <i class="bi bi-box-arrow-in-right me-1"></i>Нэвтрэх
      </button>
      <div class="text-center small text-secondary">
        Бүртгэлгүй юу? <a href="/register/" class="text-success">Бүртгүүлэх</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
async function doLogin() {
  const e = document.getElementById('loginEmail').value;
  const p = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginErr');
  errEl.classList.add('d-none');
  try {
    await Auth.login(e, p);
    showToast('success','Амжилттай нэвтэрлээ!');
    setTimeout(()=>window.location.href='/map/',800);
  } catch(err) {
    errEl.textContent = err.message || 'Нэвтрэх амжилтгүй';
    errEl.classList.remove('d-none');
  }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
{% endblock %}
